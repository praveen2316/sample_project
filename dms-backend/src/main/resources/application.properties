# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/dms_db
spring.data.mongodb.database=dms_db

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Application Upload Directory
app.upload.dir=${user.home}/dms-uploads

# JWT Configuration
app.jwt.secret=YourSecretKeyForJWTTokenGenerationMustBeLongEnoughAndSecure2024
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.dms=DEBUG
logging.level.org.springframework.security=DEBUG
